[general]
profile = profile.tizen

[profile.tizen]
obs = obs.tizen

# ── Target architecture ───────────────────────────────────────────────────────
# GBS will pass this to the spec %build section as the RPM _arch.
# armv7l is the standard Tizen mobile/wearable application processor target.
arch = armv7l

[obs.tizen]
url = https://api.tizen.org

# ── Build repos — adjust snapshot/version to your Tizen profile ──────────────
# Uncomment and set the correct URL for your Tizen version, e.g. 7.0 unified:
#
# [repo.tizen_base]
# url = http://download.tizen.org/snapshots/TIZEN/Tizen-7.0/Tizen-7.0-Base/latest/repos/armv7l/packages/
#
# [repo.tizen_main]
# url = http://download.tizen.org/snapshots/TIZEN/Tizen-7.0/Tizen-7.0/latest/repos/armv7l/packages/

# ── Cross-toolchain notes ─────────────────────────────────────────────────────
# The GBS buildroot must contain:
#   gcc-arm-linux-gnueabihf       (C cross-compiler)
#   binutils-arm-linux-gnueabihf  (linker / ar)
#   rust + cargo                  (host-side, invoked during %build)
#
# Rust cross target:
#   rustup target add armv7-unknown-linux-gnueabihf
#
# The .cargo/config.toml in this repo already configures the linker:
#   [target.armv7-unknown-linux-gnueabihf]
#   linker = "arm-linux-gnueabihf-gcc"
#
# Build the RPM:
#   gbs build -A armv7l --include-all
