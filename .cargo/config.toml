# ── Vendored sources (offline build) ─────────────────────────────────────────
[source.crates-io]
replace-with = "vendored-sources"

[source.vendored-sources]
directory = "vendor"

# ── Cross-compilation: armv7l for Tizen ──────────────────────────────────────
# Install target:  rustup target add armv7-unknown-linux-gnueabihf
# Install linker:  apt-get install gcc-arm-linux-gnueabihf   (Debian/Ubuntu)
#                  or provide via Tizen GBS buildroot toolchain
#
# Build command:
#   cargo build --release --target armv7-unknown-linux-gnueabihf --offline
#
# GBS / CMake will set CARGO_TARGET automatically via the spec file.

[target.armv7-unknown-linux-gnueabihf]
linker  = "arm-linux-gnueabihf-gcc"
ar      = "arm-linux-gnueabihf-ar"

# Tizen-flavoured variant (if using Tizen SDK toolchain)
[target.armv7l-tizen-linux-gnueabi]
linker  = "arm-linux-gnueabi-gcc"
ar      = "arm-linux-gnueabi-ar"
